    let currentSlide = 0;

    const container = document.getElementById('slide-container');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counterSpan = document.getElementById('slideCounter');

    function renderSlide() {
        container.innerHTML = slides[currentSlide].html;
        // маленький фикс — ссылки открывать в новой вкладке корректно, стили остаются
        counterSpan.innerText = `Слайд ${currentSlide + 1} / ${totalSlides}`;
        // скролл наверх при смене слайда
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextSlide() {
        if (currentSlide < totalSlides - 1) {
            currentSlide++;
            renderSlide();
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            currentSlide--;
            renderSlide();
        }
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);

    // управление с клавиатуры (стрелки)
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            prevSlide();
            e.preventDefault();
        } else if (e.key === 'ArrowRight') {
            nextSlide();
            e.preventDefault();
        }
    });

    // отрисовка первого слайда
    renderSlide();
